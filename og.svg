<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF7F4"/>
      <stop offset="1" stop-color="#CDEAE3"/>
    </linearGradient>
    <linearGradient id="ball" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.5" fill="#14b8a6">
    <circle cx="120" cy="120" r="6"/><circle cx="200" cy="80" r="4"/><circle cx="1080" cy="520" r="6"/><circle cx="1010" cy="560" r="4"/>
  </g>
  <!-- Hup ball -->
  <circle cx="880" cy="315" r="190" fill="url(#ball)"/>
  <circle cx="880" cy="315" r="190" fill="none" stroke="#0f2e2a" stroke-opacity="0.08" stroke-width="2"/>
  <text x="880" y="350" font-family="'Plus Jakarta Sans', Arial, sans-serif" font-size="120" font-weight="800" fill="#ffffff" text-anchor="middle">Hup!</text>
  <!-- Text block -->
  <g font-family="'Plus Jakarta Sans', Arial, sans-serif" fill="#123A34">
    <rect x="90" y="150" width="300" height="44" rx="22" fill="#14b8a6" opacity="0.18"/>
    <text x="110" y="181" font-size="22" font-weight="800" fill="#0f766e" letter-spacing="3">SPONTANE UITJES</text>
    <text x="100" y="300" font-size="84" font-weight="800">Geen</text>
    <text x="100" y="390" font-size="84" font-weight="800">inspiratie?</text>
    <text x="102" y="450" font-size="30" font-weight="600" fill="#5C807A">Eén tik en je hebt een passend uitje —</text>
    <text x="102" y="490" font-size="30" font-weight="600" fill="#5C807A">gezin, partner, vrienden of oma.</text>
  </g>
</svg>
