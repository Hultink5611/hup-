<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>Hup! — Spontane Uitjes</title>
  <meta name="description" content="Eén tik en we kiezen een uitje dat precies past bij jouw gezin." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#14b8a6" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Hup!" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400..800;1,500..700&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS v4 (browser build) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-mint: #EAF7F4;
      --color-mint2: #D9EEE8;
      --color-ink: #123A34;
      --color-muted: #5C807A;
      --color-line: #DCEDE8;
      --color-teal-50:  #f0fdfa;
      --color-teal-100: #ccfbf1;
      --color-teal-200: #99f6e4;
      --color-teal-400: #2dd4bf;
      --color-teal-500: #14b8a6;
      --color-teal-600: #0d9488;
      --color-teal-700: #0f766e;
      --color-amber: #F5A623;
      --font-display: "Plus Jakarta Sans", system-ui, sans-serif;
      --font-body: "Plus Jakarta Sans", system-ui, sans-serif;
    }
  </style>

  <style>
    :root { color-scheme: light; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--color-ink);
      background: linear-gradient(180deg, #EAF7F4 0%, #DCEFEA 60%, #D2EAE3 100%);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overscroll-behavior-y: none;
    }
    #root { min-height: 100dvh; }

    .shadow-soft { box-shadow: 0 14px 40px -12px rgba(15,118,110,.28), 0 4px 12px -6px rgba(15,118,110,.16); }
    .shadow-card { box-shadow: 0 10px 30px -10px rgba(15,118,110,.22); }
    .shadow-nav  { box-shadow: 0 -8px 30px -16px rgba(15,118,110,.35); }
    .ring-soft   { box-shadow: 0 0 0 6px rgba(20,184,166,.12); }

    /* HUP button */
    .hup-btn { transition: transform .14s cubic-bezier(.2,.8,.2,1), box-shadow .14s ease; }
    .hup-btn:active { transform: scale(.94); }
    .hup-pulse::before {
      content:""; position:absolute; inset:-10px; border-radius:9999px;
      border:2px solid rgba(20,184,166,.35); animation: hupPulse 2.4s ease-out infinite;
    }
    @keyframes hupPulse { 0% { transform: scale(.9); opacity:.7 } 100% { transform: scale(1.25); opacity:0 } }

    @keyframes pop { 0% { opacity:0; transform: translateY(16px) scale(.97) } 60% { transform: translateY(0) scale(1.005) } 100% { opacity:1; transform:none } }
    @keyframes rise { from { opacity:0; transform: translateY(10px) } to { opacity:1; transform:none } }
    @keyframes fade { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { transform: translateY(100%) } to { transform: none } }
    @keyframes spinwin { 0% { transform: translateY(8px); opacity:0 } 100% { transform: translateY(0); opacity:1 } }
    .pop { animation: pop .5s both cubic-bezier(.2,.8,.2,1); }
    .rise { animation: rise .45s both cubic-bezier(.2,.8,.2,1); }
    .fade { animation: fade .3s both; }
    .sheet-in { animation: slideUp .34s both cubic-bezier(.2,.8,.2,1); }
    .win-in { animation: spinwin .12s both; }

    /* Range slider */
    input[type="range"] { -webkit-appearance:none; appearance:none; width:100%; height:8px; border-radius:9999px;
      background: linear-gradient(90deg, var(--color-teal-500) var(--p,50%), #CDE8E2 var(--p,50%)); cursor:pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:26px; height:26px; border-radius:9999px;
      background:#fff; border:4px solid var(--color-teal-500); box-shadow:0 3px 8px rgba(15,118,110,.35); margin-top:0; }
    input[type="range"]::-moz-range-thumb { width:22px; height:22px; border-radius:9999px; background:#fff; border:4px solid var(--color-teal-500); box-shadow:0 3px 8px rgba(15,118,110,.35); }

    .no-scrollbar::-webkit-scrollbar { display:none; }
    .no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

    /* iOS toggle */
    .switch { width:50px; height:30px; border-radius:9999px; background:#CBE3DD; position:relative; transition:background .2s; flex:0 0 auto; }
    .switch[data-on="true"] { background: var(--color-teal-500); }
    .switch .knob { position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:9999px; background:#fff; box-shadow:0 2px 5px rgba(0,0,0,.2); transition:transform .2s; }
    .switch[data-on="true"] .knob { transform: translateX(20px); }

    @media (prefers-reduced-motion: reduce) {
      .pop,.rise,.fade,.sheet-in,.win-in,.hup-pulse::before { animation:none !important; }
      .hup-btn { transition:none; }
    }
  </style>

  <!-- React + Babel + Lucide -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <!-- App (JSX) compiled in-browser with the CLASSIC runtime (React.createElement) -->
  <script>
    (function () {
      function boot() {
        fetch('./app.js')
          .then(function (r) { return r.text(); })
          .then(function (code) {
            var out = Babel.transform(code, {
              presets: [['react', { runtime: 'classic' }]],
              filename: 'app.js',
            }).code;
            var s = document.createElement('script');
            s.textContent = out;
            document.body.appendChild(s);
          })
          .catch(function (e) { console.error('Hup! laden mislukt:', e); });
      }
      if (window.Babel && window.React && window.ReactDOM) boot();
      else window.addEventListener('load', boot);
    })();
  </script>

  <!-- Service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js').catch(function (err) {
          console.warn('SW registratie mislukt:', err);
        });
      });
    }
  </script>
</body>
</html>
